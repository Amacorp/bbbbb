# .github/workflows/make-vless-link.yml
name: Create Codespace + Publish VLESS

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  make:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.CODESPACE_PAT }}
      REPO: ${{ github.repository }}
      REF: main
      PORT: "443"
      UUID: "UUID_HERE"
    steps:
      - name: Sanity check gh
        run: gh --version

      - name: Get repo id
        id: repo
        run: |
          rid=$(gh api "repos/$REPO" --jq .id)
          echo "repo_id=$rid" >> "$GITHUB_OUTPUT"

      - name: Create codespace
        id: cs
        run: |
          # Create a codespace owned by the authenticated user for this repo+ref
          # Codespaces REST API docs: POST /user/codespaces
          # (requires codespace scope) <!--citation:7-->
          resp=$(gh api -X POST user/codespaces \
            -f repository_id='${{ steps.repo.outputs.repo_id }}' \
            -f ref="$REF")
          name=$(echo "$resp" | jq -r .name)
          echo "codespace_name=$name" >> "$GITHUB_OUTPUT"
          echo "Created: $name"

      - name: Wait a bit (codespace provisioning)
        run: sleep 20

      - name: Make port 443 public
        run: |
          # Make forwarded port public (GitHub docs + gh manual) <!--citation:1-->
          gh codespace ports visibility "${PORT}:public" -c "${{ steps.cs.outputs.codespace_name }}" || true

      - name: Build VLESS link (domain-based)
        id: link
        run: |
          host="${{ steps.cs.outputs.codespace_name }}-${PORT}.app.github.dev"
          vless="vless://${UUID}@${host}:443?encryption=none&security=tls&type=xhttp&mode=packet-up&path=%2F&sni=${host}#g2ray"
          echo "$vless" | tee vless.txt
          echo "vless=$vless" >> "$GITHUB_OUTPUT"

      - name: Publish to workflow summary
        run: |
          echo "### Your VLESS link" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ steps.link.outputs.vless }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vless-link
          path: vless.txt
