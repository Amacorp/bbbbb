name: g2ray (Codespace) - Create/Start + Public Port + VLESS(WS)

on:
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.CODESPACE_PAT }}

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq

      - name: Read UUID from .devcontainer/config.json
        id: uuid
        run: |
          UUID=$(jq -r '.inbounds[0].settings.clients[0].id' .devcontainer/config.json)
          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"

      - name: Pick existing codespace (or create a new one)
        id: cs
        run: |
          set -euo pipefail

          EXISTING="$(gh codespace list -R "${GITHUB_REPOSITORY}" --json name,state --jq '.[0].name // empty')"
          if [ -n "$EXISTING" ]; then
            echo "Using existing codespace: $EXISTING"
            echo "name=$EXISTING" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No existing codespace found; creating..."
          NAME=$(gh api -X POST "repos/${GITHUB_REPOSITORY}/codespaces" \
            -f ref="main" \
            -f devcontainer_path=".devcontainer/devcontainer.json" \
            --jq .name)
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Created: $NAME"

      - name: Start codespace (if not running)
        run: |
          set -euo pipefail
          NAME="${{ steps.cs.outputs.name }}"
          STATE=$(gh api "user/codespaces/$NAME" --jq .state)
          echo "Current state: $STATE"
          if [ "$STATE" != "Available" ]; then
            gh api -X POST "user/codespaces/$NAME/start" >/dev/null
          fi

      - name: Wait until Available
        run: |
          set -euo pipefail
          NAME="${{ steps.cs.outputs.name }}"
          for i in $(seq 1 120); do
            STATE=$(gh api "user/codespaces/$NAME" --jq .state)
            echo "State: $STATE"
            if [ "$STATE" = "Available" ]; then exit 0; fi
            sleep 5
          done
          echo "Timeout waiting for Available"
          exit 1

      - name: Wait for port 443 to appear
        run: |
          set -euo pipefail
          NAME="${{ steps.cs.outputs.name }}"
          for i in $(seq 1 120); do
            FOUND=$(gh codespace ports -c "$NAME" --json sourcePort --jq '[.[] | select(.sourcePort==443)] | length')
            echo "Found port 443 entries: $FOUND"
            if [ "$FOUND" -ge 1 ]; then exit 0; fi
            sleep 5
          done
          echo "Port 443 never appeared. Dumping ports:"
          gh codespace ports -c "$NAME" --json sourcePort,visibility,browseUrl,label || true
          exit 1

      - name: Make port 443 PUBLIC (fail if not possible)
        run: |
          set -euo pipefail
          NAME="${{ steps.cs.outputs.name }}"
          gh codespace ports visibility 443:public -c "$NAME"
          gh codespace ports -c "$NAME" --json sourcePort,visibility,browseUrl,label

          VIS=$(gh codespace ports -c "$NAME" --json sourcePort,visibility --jq '.[] | select(.sourcePort==443) | .visibility' | head -n 1)
          echo "Visibility for 443: $VIS"
          test "$VIS" = "public"

      - name: (Optional) show Xray status/logs from inside codespace
        run: |
          set -euo pipefail
          NAME="${{ steps.cs.outputs.name }}"
          # This will only help debugging; don't fail workflow if it errors.
          gh codespace ssh -c "$NAME" -- "pgrep -a xray || true; ss -lntp | grep ':443' || true; tail -n 50 /tmp/xray.log || true" || true

      - name: Build VLESS(WS) link
        id: link
        run: |
          NAME="${{ steps.cs.outputs.name }}"
          UUID="${{ steps.uuid.outputs.uuid }}"
          HOST="${NAME}-443.app.github.dev"

          VLESS="vless://${UUID}@${HOST}:443?encryption=none&security=tls&type=ws&path=%2Fws&host=${HOST}&sni=${HOST}#g2ray-ws"
          echo "$VLESS" | tee vless.txt
          echo "vless=$VLESS" >> "$GITHUB_OUTPUT"

      - name: Publish in workflow summary
        run: |
          echo "### VLESS (WS) link" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ steps.link.outputs.vless }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Codespace: \`${{ steps.cs.outputs.name }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vless-link
          path: vless.txt
