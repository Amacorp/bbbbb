name: g2ray - Create Codespace and Print VLESS

on:
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.CODESPACE_PAT }}

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq

      - name: Read UUID from .devcontainer/config.json
        id: uuid
        run: |
          UUID=$(jq -r '.inbounds[0].settings.clients[0].id' .devcontainer/config.json)
          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"

      - name: Create codespace for this repo (main)
        id: cs
        run: |
          NAME=$(gh api -X POST "repos/${GITHUB_REPOSITORY}/codespaces" \
            -f ref="main" \
            -f devcontainer_path=".devcontainer/devcontainer.json" \
            --jq .name)
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Created codespace: $NAME"
          # Creating a codespace here requires `codespace` scope on classic PAT. <!--citation:3-->

      - name: Wait until Available
        run: |
          NAME="${{ steps.cs.outputs.name }}"
          for i in $(seq 1 90); do
            STATE=$(gh api "user/codespaces/$NAME" --jq .state)
            echo "State: $STATE"
            if [ "$STATE" = "Available" ]; then exit 0; fi
            sleep 10
          done
          exit 1

      - name: Print VLESS (based on standard forwarded-port domain)
        id: link
        run: |
          NAME="${{ steps.cs.outputs.name }}"
          UUID="${{ steps.uuid.outputs.uuid }}"
          HOST="${NAME}-443.app.github.dev"

          VLESS="vless://${UUID}@${HOST}:443?encryption=none&security=tls&type=xhttp&mode=packet-up&path=%2F&sni=${HOST}#g2ray"
          echo "$VLESS" | tee vless.txt
          echo "vless=$VLESS" >> "$GITHUB_OUTPUT"

      - name: Show in Summary
        run: |
          echo "### VLESS link" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ steps.link.outputs.vless }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vless-link
          path: vless.txt
